<div class="management-page"><app-breadcrumb></app-breadcrumb><form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-card"><header><h1>{{ pageTitle() }}</h1><button type="button" class="btn-close" (click)="onCancel()"></button></header>@if (isLoading()) { <div class="loading-state"><div class="spinner-border text-primary"></div><p>Loading fastener...</p></div> } @else { <div class="form-grid"><label>Item Code *<input class="form-control" formControlName="itemCode" [class.is-invalid]="isFieldInvalid('itemCode')" /></label><label>Item Name *<input class="form-control" formControlName="itemName" [class.is-invalid]="isFieldInvalid('itemName')" /></label><label>Category<input class="form-control" formControlName="category" /></label><label>Size<input class="form-control" formControlName="size" placeholder="e.g. M6x20" /></label><label>Unit<input class="form-control" formControlName="unit" /></label><label>Current Stock<input class="form-control" type="number" formControlName="currentStock" /></label><label>Minimum Stock<input class="form-control" type="number" formControlName="minimumStock" /></label><label>Shop Name<input class="form-control" formControlName="shopName" /></label><label>Location<input class="form-control" formControlName="location" /></label></div><div class="upload-block"><label>Item Photo *</label><label class="photo-drop"><input #photoInput type="file" accept="image/*" capture="environment" (change)="onPhotoSelected($event)" /><span><i class="bi bi-camera"></i><i class="bi bi-upload"></i></span><em>Tap to take photo or upload<br /><small>(camera auto-opens on mobile)</small></em></label>@if (selectedPhotoPreviewUrl()) { <div class="photo-preview-wrap"><img class="photo-preview" [src]="selectedPhotoPreviewUrl()!" alt="Selected photo" /><button type="button" class="photo-remove btn btn-outline-danger btn-sm" (click)="removePhoto(photoInput)"><i class="bi bi-trash"></i> Remove Photo</button></div> } @else if (currentPhotoUrl()) { <div class="photo-preview-wrap"><img class="photo-preview" [src]="getPhotoUrl(currentPhotoUrl())" alt="Current photo" /><button type="button" class="photo-remove btn btn-outline-danger btn-sm" (click)="removePhoto(photoInput)"><i class="bi bi-trash"></i> Remove Photo</button></div> }</div><label class="check"><input type="checkbox" formControlName="isActive" /> Active</label><footer><button type="button" class="btn btn-outline-secondary" (click)="onCancel()">Cancel</button><button type="submit" class="btn btn-primary" [disabled]="isSubmitting()">{{ isSubmitting() ? 'Saving...' : 'Save' }}</button></footer> }</form></div>
