<div class="management-page"><app-breadcrumb></app-breadcrumb><form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-card"><header><h1>{{ pageTitle() }}</h1><button type="button" class="btn-close" (click)="onCancel()"></button></header>@if (isLoading()) { <div class="loading-state"><div class="spinner-border text-primary"></div><p>Loading issue...</p></div> } @else { <div class="form-grid"><label>Instrument *<select class="form-select" formControlName="instrumentCorrelationId"><option value="">Select instrument</option>@for (item of instruments(); track item.correlationId) { <option [value]="item.correlationId">{{ item.code }} - {{ item.instrumentName }}</option> }</select></label><label>Status<select class="form-select" formControlName="status">@for (status of statuses; track status) { <option [value]="status">{{ status }}</option> }</select></label><label>Issued To *<input class="form-control" formControlName="issuedTo" /></label><label>Department<input class="form-control" formControlName="department" /></label><label>Issue Date *<input class="form-control" type="date" formControlName="issueDate" /></label><label>Return Date<input class="form-control" type="date" formControlName="returnDate" /></label><label class="span-2">Remarks<input class="form-control" formControlName="remarks" /></label></div><div class="upload-block"><label>Issue Photo</label><label class="photo-drop"><input type="file" accept="image/*" capture="environment" (change)="onPhotoSelected($event)" /><span><i class="bi bi-camera"></i><i class="bi bi-upload"></i></span><em>Tap to take photo or upload<br /><small>(camera auto-opens on mobile)</small></em></label>@if (selectedPhotoPreviewUrl()) { <img class="photo-preview" [src]="selectedPhotoPreviewUrl()!" alt="Selected photo" /> } @else if (currentPhotoUrl()) { <img class="photo-preview" [src]="getPhotoUrl(currentPhotoUrl())" alt="Current photo" /> }</div><footer><button type="button" class="btn btn-outline-secondary" (click)="onCancel()">Cancel</button><button type="submit" class="btn btn-primary" [disabled]="isSubmitting()">{{ isSubmitting() ? 'Saving...' : 'Save' }}</button></footer> }</form></div>
