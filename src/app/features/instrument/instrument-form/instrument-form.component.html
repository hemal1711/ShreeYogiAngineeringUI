<div class="management-page"><app-breadcrumb></app-breadcrumb><form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-card"><header><h1>{{ pageTitle() }}</h1><button type="button" class="btn-close" (click)="onCancel()"></button></header>@if (isLoading()) { <div class="loading-state"><div class="spinner-border text-primary"></div><p>Loading instrument...</p></div> } @else { <div class="form-grid"><label>Code *<input class="form-control" formControlName="code" /></label><label>Instrument Name *<input class="form-control" formControlName="instrumentName" /></label><label>Category<input class="form-control" formControlName="category" /></label><label>Make / Brand<input class="form-control" formControlName="makeBrand" placeholder="e.g. Mitutoyo" /></label><label>Serial No<input class="form-control" formControlName="serialNo" /></label><label>Calibration Due Date<input class="form-control" type="date" formControlName="calibrationDueDate" /></label><label>Current Stock<input class="form-control" type="number" formControlName="currentStock" /></label><label>Location<input class="form-control" formControlName="location" /></label></div><div class="upload-block"><label>Instrument Photo</label><label class="photo-drop"><input type="file" accept="image/*" capture="environment" (change)="onPhotoSelected($event)" /><span><i class="bi bi-camera"></i><i class="bi bi-upload"></i></span><em>Tap to take photo or upload<br /><small>(camera auto-opens on mobile)</small></em></label>@if (selectedPhotoPreviewUrl()) { <img class="photo-preview" [src]="selectedPhotoPreviewUrl()!" alt="Selected photo" /> } @else if (currentPhotoUrl()) { <img class="photo-preview" [src]="getPhotoUrl(currentPhotoUrl())" alt="Current photo" /> }</div><label class="check"><input type="checkbox" formControlName="isActive" /> Active</label><footer><button type="button" class="btn btn-outline-secondary" (click)="onCancel()">Cancel</button><button type="submit" class="btn btn-primary" [disabled]="isSubmitting()">{{ isSubmitting() ? 'Saving...' : 'Save' }}</button></footer> }</form></div>
