<header class="shell-header">
  <div class="shell-header__left">
    <button
      type="button"
      class="shell-header__toggle"
      (click)="toggleSidebar()"
      [attr.aria-label]="layout.sidebarCollapsed() ? 'Show sidebar' : 'Hide sidebar'"
      [attr.title]="layout.sidebarCollapsed() ? 'Show sidebar' : 'Hide sidebar'"
    >
      <i class="bi" [class.bi-list]="layout.sidebarCollapsed()" [class.bi-layout-sidebar-inset]="!layout.sidebarCollapsed()"></i>
    </button>

    <div class="shell-header__title">
      <strong>{{ pageTitle() }}</strong>
      <span class="shell-header__subtitle">
        <b>Shree Yogi Engineering System</b>
        <!-- <em>{{ currentRoute() }}</em> -->
      </span>
    </div>
  </div>

  <div class="shell-header__actions">
    @if (currentUser(); as user) {
      <div class="shell-header__menu">
        <button type="button" class="shell-header__profile" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()">
          <div class="shell-header__avatar">{{ initials() }}</div>
          <div class="shell-header__identity">
            <strong>{{ user.fullName || user.userName || 'Admin User' }}</strong>
            <small>{{ user.roles[0] || 'Admin' }}</small>
          </div>
          <i class="bi bi-chevron-down shell-header__profile-caret" [class.shell-header__profile-caret--open]="menuOpen()"></i>
        </button>

        @if (menuOpen()) {
          <div class="shell-header__dropdown">
            <a routerLink="/profile" (click)="closeMenu()">
              <i class="bi bi-person"></i>
              <span>Profile</span>
            </a>
            <button type="button" (click)="logout()">
              <i class="bi bi-box-arrow-right"></i>
              <span>Log Out</span>
            </button>
          </div>
        }
      </div>
    }
  </div>
</header>
