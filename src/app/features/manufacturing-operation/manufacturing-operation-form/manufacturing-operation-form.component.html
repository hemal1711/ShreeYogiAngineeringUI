<div class="management-form-page"><app-breadcrumb></app-breadcrumb><div class="form-header"><div><h1>{{ pageTitle() }}</h1><p>Track received, dispatched, and rejected item quantities.</p></div></div>@if (isLoading()) { <div class="loading-state"><div class="spinner-border text-primary"></div><p>Loading operation...</p></div> } @if (!isLoading()) { <form [formGroup]="form" (ngSubmit)="onSubmit()" class="management-form operation-form"><div class="form-grid"><div class="mb-3"><label class="form-label">Item <span>*</span></label><select class="form-select" formControlName="manufacturingItemCorrelationId" [class.is-invalid]="isFieldInvalid('manufacturingItemCorrelationId')"><option value="">Select item</option>@for (item of items(); track item.correlationId) { <option [value]="item.correlationId">{{ item.itemCode }} - {{ item.customerCode }}</option> }</select></div><div class="mb-3"><label class="form-label">Type <span>*</span></label><select class="form-select" formControlName="operationType">@for (type of types; track type) { <option [value]="type">{{ type }}</option> }</select></div><div class="mb-3"><label class="form-label">Quantity <span>*</span></label><input type="number" min="0.01" step="0.01" class="form-control" formControlName="quantity" [class.is-invalid]="isFieldInvalid('quantity')" /></div><div class="mb-3"><label class="form-label">Date <span>*</span></label><input type="date" class="form-control" formControlName="operationDate" /></div><div class="mb-3"><label class="form-label">Challan No</label><input class="form-control" formControlName="challanNo" /></div><div class="mb-3"><label class="form-label">Lot No</label><input class="form-control" formControlName="lotNo" /></div></div><div class="mb-3"><label class="form-label">Remarks</label><textarea rows="3" class="form-control" formControlName="remarks"></textarea></div><div class="mb-3"><label class="form-label" for="photo">Operation Photo</label><label class="photo-upload" for="photo"><i class="bi bi-camera"></i><span>{{ selectedPhoto()?.name || 'Tap to take photo or upload' }}</span><small>Camera opens on supported mobile browsers</small></label><input id="photo" type="file" accept="image/*" capture="environment" (change)="onPhotoSelected($event)" hidden />@if (selectedPhotoPreviewUrl()) { <img class="photo-preview" [src]="selectedPhotoPreviewUrl()!" alt="Selected operation photo" /> } @else if (currentPhotoUrl()) { <img class="photo-preview" [src]="getPhotoUrl(currentPhotoUrl())" alt="Current operation photo" /> }</div><div class="form-actions"><button type="button" class="btn btn-outline-secondary" [disabled]="isSubmitting()" (click)="onCancel()">Cancel</button><button type="submit" class="btn btn-primary" [disabled]="isSubmitting()">@if (isSubmitting()) { <span><span class="spinner-border spinner-border-sm me-2"></span>Saving...</span> } @else { <span>Save</span> }</button></div></form> }</div>
